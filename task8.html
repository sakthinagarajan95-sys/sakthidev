<!DOCTYPE html>
<html>
<head>
<title>order tracking</title>
<style>
      
.form-actions {
    margin-top: 30px;
    text-align: center;
  }
    </style>
</head>
<body>
<h1 style="text-align:center;">Order/delivery Tracking</h1>
<h3 style="text-align:center;">Trace Your order</h3>
<h2>Personal Information</h2>
<hr>

<label>Name*</label>
<div class="name" style="margin-left:600px;">
<input type="text" place holder="Enter Your Name"><br>
</div>

<label>Email*</label>
<div class="name" style="margin-left:600px;">
<input type="text" place holder="Enter Your Valid Email"><br>
</div>
<label>Contact number*</label>
<div class="name" style="margin-left:600px;">
<input type="text" place holder="Enter Your mobile"><br>
</div>
<h2>Order Information</h2>
<hr>
<label>Order ID*</label>
<div class="name" style="margin-left:600px;">
<input type="text" place holder="Enter Your Order ID">
</div>
<label>delivery Destination*</label>
<div class="name" style="margin-left:600px;">
<input type="text" place holder="">
</div>
<div class="sub-group" style="margin-bottom: 12px;">

<span class="sub-label">Street Address</span>
<div class="name" style="margin-left:600px;">
<input type="text" name="address1" required>
</div>           
<div class="sub-group" style="margin-bottom: 12px;">
<span class="sub-label">Address Line 2</span>
<div class="name" style="margin-left:600px;">
<input type="text" name="address2">
</div>
<div class="input-row">
<div class="sub-group"style="margin-bottom: 12px;">
<span class="sub-label">City</span>
<div class="name" style="margin-left:600px;">
<input type="text" name="city">
</div>
<div class="sub-group"style="margin-bottom: 12px;">
<span class="sub-label">State/Region/Province</span>
<div class="name" style="margin-left:600px;">
<input type="text" name="state">
</div>
<div class="sub-group"style="margin-bottom: 12px;">
<span class="sub-label">Zip Code</span>
<div class="name" style="margin-left:600px;">
<input type="text" name="zip">
</div>
<div class="sub-group"style="margin-bottom: 12px;">
<span class="sub-label">Country</span>
<div class="name" style="margin-left:600px;">
<select name="country">
                        <option>select</option>
                        <option>India</option>
                        <option>Canada</option>
                        <option>United Kingdom</option>
                        <option>Australia</option>

</div>
<br>
<div>
<label>delivery Destination*</label>
<div class="name" style="margin-left:600px;">
</div>
<input type="text" place holder="">
</div>
<br>
<div>
<form action="#">
<div style="text-align: center;">
<button type="submit">Submit</button>
</div>
</form>
</div>
</body>
