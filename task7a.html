<!DOCTYPE html>
<html>
<head>
<title>calculator</title>
<style>

table {
  width: 320px;
  margin: 20px auto;
  border-collapse: collapse;
}
table td {
  border: 1px solid black;
  text-align: center;
  padding: 15px;
  font-family: Arial, sans-serif;
  font-weight: bold;
}
.btn {
    background-color: #f0f0f0;
    cursor: pointer;
  }
</style>
</head>
<body>
<tr>
<div >
<h4 style="background-color:#800080;text-align:center;padding:10px;">calculator</h4>
</div>
<table>
<tr>

<div class="calculator"></div>
<tr>
    <td colspan="4" id="display"text-align:right;>0</td>
  </tr>

<tr>
<td class="btn">(</td>
<td class="btn">)</td>
<td class="btn">%</td>
<td class="btn">/</td>
</tr>
<tr>
<td class="btn">7</td>
<td class="btn">8</td>
<td class="btn">9</td>
<td class="btn">*</td>
</tr>
<tr>
<td class="btn">4</td>
<td class="btn">5</td>
<td class="btn">6</td>
<td class="btn">-</td>
</tr>
<tr>
<td class="btn">1</td>
<td class="btn">2</td>
<td class="btn">3</td>

<td th rowspan="2"class="btn">+</td>
</tr>
<tr>
<td class="btn">Del</td>
<td class="btn">0</td>
<td class="btn">=</td>
</tr>
